apiVersion: v1
kind: Service
metadata:
  name: argocd-lb
  namespace: argocd
spec:
  type: LoadBalancer
  selector:
    app: argocd-tls-proxy
  ports:
    - name: https
      port: 443
      targetPort: 443
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-tls-proxy
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-tls-proxy
  template:
    metadata:
      labels:
        app: argocd-tls-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 443
          name: https
        - containerPort: 80
          name: http
        volumeMounts:
        - name: cert
          mountPath: /etc/nginx/ssl
          readOnly: true
        - name: config
          mountPath: /etc/nginx/conf.d
          readOnly: true
      volumes:
      - name: cert
        secret:
          secretName: argocd-tls
      - name: config
        configMap:
          name: argocd-tls-proxy-conf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-tls-proxy-conf
  namespace: argocd
data:
  default.conf: |
    server {
      listen 443 ssl;
      server_name argocd.container.it-scholar.com;

      ssl_certificate /etc/nginx/ssl/tls.crt;
      ssl_certificate_key /etc/nginx/ssl/tls.key;

      location / {
        proxy_pass http://argo-cd-argocd-server.argocd.svc.cluster.local:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
    server {
      listen 80;
      server_name argocd.container.it-scholar.com;
      return 301 https://$host$request_uri;
    }
