services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: jokes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jokes
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "4000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:3000
      PORT: 8080
    ports:
      - "9000:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
