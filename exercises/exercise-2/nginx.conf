user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Hardening ─────────────────────────────────────────────────────────
    server_tokens off;            # do not reveal nginx version in headers/pages

    # ── Performance ───────────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    gzip              off;        # off for a static demo; enable with types if needed

    # ── Access log (to Docker log driver via stdout symlink) ─────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    server {
        listen      8080;         # unprivileged port; no CAP_NET_BIND_SERVICE needed
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── HTTP security headers ─────────────────────────────────────────
        add_header X-Frame-Options           "DENY"                                    always;
        add_header X-Content-Type-Options    "nosniff"                                 always;
        add_header X-XSS-Protection          "1; mode=block"                           always;
        add_header Referrer-Policy           "no-referrer"                             always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy   "default-src 'self'; style-src 'unsafe-inline'" always;

        location / {
            try_files $uri $uri/ =404;
        }

        # Deny access to hidden files (.git, .env, etc.)
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
